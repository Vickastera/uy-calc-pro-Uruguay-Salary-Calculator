<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UY Calc Pro</title>

  <link rel="stylesheet" href="style.css">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<input id="years" type="number" placeholder="Años trabajados" style="display:none;">
  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="app">

  <h1>💰 UY Calc Pro</h1>

  <input id="salary" type="number" placeholder="Sueldo bruto">

  <select id="type">
    <option value="salary">Sueldo normal</option>
    <option value="resignation">Renuncia</option>
    <option value="dismissal">Despido</option>
  </select>

  <!-- TOGGLE HIJOS -->
  <div class="toggle-row">
    <span>Con hijos</span>
    <label class="switch">
      <input type="checkbox" id="children">
      <span class="slider"></span>
    </label>
  </div>

  <button onclick="calculate()">Calcular</button>
  <button onclick="downloadPDF()">Descargar PDF</button>

  <div id="result"></div>

  <!-- GRAFICO -->
  <canvas id="chart"></canvas>

  <!-- LEYENDA -->
  <div class="legend">
    <div><span class="dot irpf"></span> IRPF</div>
    <div><span class="dot fonasa"></span> FONASA</div>
    <div><span class="dot extra"></span> Extra</div>
    <div><span class="dot neto"></span> Neto</div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
