<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UY Calc Pro</title>
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="app">

  <h1>🇺🇾 UY Calc Pro</h1>
  <p>Calculadora laboral inteligente</p>

  <input type="number" id="sueldo" placeholder="Sueldo nominal">

  <select id="hijos">
    <option value="0">Sin hijos</option>
    <option value="1">Con hijos</option>
  </select>

  <select id="tipo">
    <option value="mensual">Mensual</option>
    <option value="renuncia">Renuncia</option>
    <option value="despido">Despido</option>
  </select>

  <button onclick="calcular()">Calcular</button>
  <button onclick="descargarPDF()">Exportar PDF</button>

  <div id="resultado"></div>

  <canvas id="grafico"></canvas>

  <button onclick="toggleDark()">🌙 Modo oscuro</button>

</div>

<script src="script.js"></script>
</body>
</html>
