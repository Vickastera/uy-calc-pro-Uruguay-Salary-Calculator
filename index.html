<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UY Calc Pro</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
<div class="app">

  <h1>💰 UY Calc Pro</h1>
<a href="https://www.gub.uy/ministerio-trabajo-seguridad-social/comunicacion/noticias/salario-minimo-nacional-24572-desde-1o-enero-2026" target="_blank" title="Link para ir al gub.uy"> 🏦Sueldo minimo actual: $24.572</a>
  <input id="salary" oninput="if (this.value.length >= 7) this.value = this.value.slice(0, 7);" onkeydown="if (event.key === 'e' || event.key === 'E' || event.key === '-') { return false;}" min = "0" max="9999999" type="number" placeholder="Sueldo bruto">
  <input id="months" oninput="if (this.value.length >= 2) this.value = this.value.slice(0, 2); if (this.value < 1) this.value = 1; if (this.value >12) this.value = Math.min(this.value, 12);" onkeydown="if (event.key === 'e' || event.key === 'E' || event.key === '-') { return false;}" min = "1" max="12" type="number" placeholder="Meses trabajados este año (1-12)">
  <input id="days" oninput="if (this.value.length >= 2) this.value = this.value.slice(0, 2); if (this.value < 1) this.value = 1; if (this.value >30) this.value = Math.min(this.value, 30);" onkeydown="if (event.key === 'e' || event.key === 'E' || event.key === '-') { return false;}" min = "1" max="30" type="number" placeholder="Días de licencia (1-30)" style="display:none;">

  <select id="type">
    <option value="salary">Sueldo normal</option>
    <option value="resignation">Renuncia</option>
    <option value="dismissal">Despido</option>
  

  </select>

  <!-- ANTIGÜEDAD -->
  <input id="years" type="number" oninput="if (this.value.length >= 2) this.value = this.value.slice(0, 2); if (this.value >60) this.value = Math.min(this.value, 60);" onkeydown="if (event.key === 'e' || event.key === 'E' || event.key === '-') { return false;}" min = "0" max="60" placeholder="Años trabajados (máximo 60)" style="display:none;">

  <!-- HIJOS -->
  <div class="toggle-row">
    <span>Con hijos</span>
    <label class="switch">
      <input type="checkbox" id="children">
      <span class="slider"></span>
    </label>
  </div>
  <!-- VACACIONES -->
  <div class="toggle-row">
    <span>Incluir salario vacacional</span>
    <label class="switch">
    <input type="checkbox" id="vacation">
    <span class="slider"></span>
    </label>
  </div>

  <button onclick="calculate()">Calcular</button>
  <button id="downloadPDF" onclick="downloadPDF()" disabled>Descargar PDF</button>

  <div id="result"></div>

  <canvas id="chart"></canvas>

</div>
<!-- SCRIPT SIEMPRE AL FINAL -->
<script src="script.js"></script>

</body>
</html>
